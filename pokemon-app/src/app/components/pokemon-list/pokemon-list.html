<div class="container">
  <button (click)="goBack()" class="back-btn">← Torna ai tipi</button>
  <h2>Pokémon di tipo: <span class="type-name">{{ typeName | titlecase }}</span></h2>

  @if (loading) {
    <div class="loading">Caricamento...</div>
  } @else {
    <ul class="pokemon-list">
      @for (p of pokemonList; track p.name) {
        <li (click)="selectPokemon(p.url)" class="pokemon-item">
          {{ p.name | titlecase }}
        </li>
      } 
    </ul>
  }
</div>
